apiVersion: 1
groups:
  - orgId: 1
    name: Import Health
    folder: Observa Alerts
    interval: 10m
    rules:
      - uid: import-stale
        title: Import is stale (>36 hours)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: inaturalist
            model:
              rawSql: "SELECT EXTRACT(EPOCH FROM now() - finished_at) / 3600 AS hours_since FROM import_log WHERE status = 'completed' ORDER BY id DESC LIMIT 1;"
              format: table
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [36]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "No successful import in the last 36 hours"

      - uid: import-failed
        title: Last import failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: inaturalist
            model:
              rawSql: "SELECT CASE WHEN status = 'failed' THEN 1 ELSE 0 END AS is_failed FROM import_log ORDER BY id DESC LIMIT 1;"
              format: table
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "The most recent import has failed"

      - uid: import-count-drop
        title: Observation count dropped >10%
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: inaturalist
            model:
              rawSql: >
                SELECT CASE
                  WHEN prev.observations_count > 0
                    THEN 100.0 * (prev.observations_count - curr.observations_count) / prev.observations_count
                  ELSE 0
                END AS pct_drop
                FROM import_log curr
                JOIN import_log prev ON prev.id = (
                  SELECT id FROM import_log
                  WHERE status = 'completed' AND id < curr.id
                  ORDER BY id DESC LIMIT 1
                )
                WHERE curr.id = (SELECT id FROM import_log WHERE status = 'completed' ORDER BY id DESC LIMIT 1);
              format: table
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Observation count dropped more than 10% between imports"

      - uid: import-hung
        title: Import stuck running (>4 hours)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: inaturalist
            model:
              rawSql: "SELECT count(*) AS hung_count FROM import_log WHERE status = 'running' AND started_at < now() - interval '4 hours';"
              format: table
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "An import has been in 'running' state for more than 4 hours"

  - orgId: 1
    name: Data Quality
    folder: Observa Alerts
    interval: 10m
    rules:
      - uid: quality-null-taxon
        title: High NULL taxon_id percentage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: inaturalist
            model:
              rawSql: "SELECT null_taxon_pct FROM import_stats ORDER BY id DESC LIMIT 1;"
              format: table
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [15]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "More than 15% of observations have NULL taxon_id — possible upstream data issue"

      - uid: quality-stale-observations
        title: Latest observation is stale (>90 days old)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: inaturalist
            model:
              rawSql: "SELECT EXTRACT(EPOCH FROM now() - max_observed_on::timestamptz) / 86400 AS days_stale FROM import_stats ORDER BY id DESC LIMIT 1;"
              format: table
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "The most recent observation date is over 90 days ago — upstream data may be stale"

      - uid: quality-geo-collapse
        title: Geographic bounding box collapsed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: inaturalist
            model:
              rawSql: "SELECT CASE WHEN (bbox_max_lat - bbox_min_lat) < 1 AND (bbox_max_lon - bbox_min_lon) < 1 THEN 1 ELSE 0 END AS collapsed FROM import_stats ORDER BY id DESC LIMIT 1;"
              format: table
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "All observations are clustered within a 1-degree bounding box — possible data corruption"
