# Connection
listen_addresses = '*'

# PostgreSQL tuning for analytical workloads (~200M rows)
# Adjust values based on available system RAM

# Memory (assumes ~16GB RAM available to container)
shared_buffers = 4GB
effective_cache_size = 12GB
maintenance_work_mem = 2GB

# work_mem is allocated per-sort/hash operation, not per-query. A single
# complex query can use work_mem × number_of_operations. With parallel
# queries each worker gets its own allocation, so worst-case memory for
# one query is roughly:
#   work_mem × max_parallel_workers_per_gather × operations_per_worker
# At 256MB × 4 workers that's ~1GB per query before spilling to disk.
# With the default max_connections = 100, concurrent Grafana panels could
# theoretically exceed available RAM. If running on <16GB or with many
# concurrent users, lower this value (64–128MB) or reduce max_connections.
work_mem = 256MB

# Parallelism
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_worker_processes = 8

# Storage (assumes SSD)
random_page_cost = 1.1
effective_io_concurrency = 200

# WAL / Checkpoint (tuned for bulk loads)
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 4GB

# Extensions
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all

# Logging
log_min_duration_statement = 5000
