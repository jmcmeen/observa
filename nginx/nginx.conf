worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting: 10 requests/second per IP with burst of 20
    # Skip rate limiting for CORS preflight OPTIONS requests
    map $request_method $limit_key {
        OPTIONS  "";
        default  $binary_remote_addr;
    }
    limit_req_zone $limit_key zone=api_no_preflight:10m rate=10r/s;

    # Access logging
    log_format api_log '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time';

    access_log /var/log/nginx/access.log api_log;
    error_log /var/log/nginx/error.log warn;

    upstream postgrest {
        server postgrest:3000;
    }

    server {
        listen 3001;

        # Health check endpoint (no rate limit)
        location = /v_health {
            proxy_pass http://postgrest;
            proxy_set_header Host $host;
        }

        # API endpoints with rate limiting (OPTIONS excluded via map)
        location / {
            limit_req zone=api_no_preflight burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://postgrest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers for browser clients
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Max-Age 86400 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }
    }
}
