services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: 2g
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-observa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-inaturalist}
      API_USER_PASSWORD: ${API_USER_PASSWORD:?Set API_USER_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-observa} -d ${POSTGRES_DB:-inaturalist}"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in .env}
      POSTGRES_USER: ${POSTGRES_USER:-observa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-inaturalist}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  importer:
    build: ./importer
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-observa}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATABASE: ${POSTGRES_DB:-inaturalist}
      IMPORT_CRON: ${IMPORT_CRON:-0 3 * * *}
    volumes:
      - ./db/scripts:/scripts:ro
      - import_cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "pgrep supercronic"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  postgrest:
    image: postgrest/postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://api_user:${API_USER_PASSWORD:?Set API_USER_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-inaturalist}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: api_readonly
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    build: ./backup
    restart: "no"
    profiles:
      - backup
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-observa}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATABASE: ${POSTGRES_DB:-inaturalist}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-4}
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  grafana_data:
  backup_data:
  import_cache:
